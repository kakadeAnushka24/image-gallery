<!DOCTYPE html>
<html>

<head>
    <title>Flower Gallery</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4c4c4c, #cfdef3);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 500px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        .gallery-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-img {
            width: 320px;
            height: 320px;
            border-radius: 12px;
            object-fit: cover;
        }

        .btn {
            font-size: 18px;
            margin: 10px;
            padding: 10px;
            cursor: pointer;
            border: none;
            background-color: #4a69bd;
            color: white;
            border-radius: 50%;
        }

        .btn:hover {
            background-color: #1e3799;
        }

        #title {
            margin-top: 10px;
            color: #222;
        }

        #description {
            color: #555;
            font-size: 14px;
        }

        #extra {
            color: #888;
            font-size: 13px;
        }

        .gallery-preview {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 70px;
            height: 70px;
            margin: 5px;
            cursor: pointer;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .preview-img:hover {
            border: 2px solid #4a69bd;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌸 Flower Gallery 🌸</h1>

    <div class="gallery-container">
        <button class="btn" onclick="slideLeft()">❮</button>

        <img id="mainImage" class="main-img">

        <button class="btn" onclick="slideRight()">❯</button>
    </div>

    <h2 id="title"></h2>
    <p id="description"></p>
    <p id="extra"></p>

    <div class="gallery-preview" id="gallery-preview"></div>

</div>

<script>
    const IMAGES = [
        { url: "rose.png", title: "Rose", description: "Symbol of love.", rating: 4.9 },
        { url: "lotus.png", title: "Lotus", description: "National flower.", rating: 4.8 },
        { url: "sunflower.png", title: "Sunflower", description: "Follows sun.", rating: 4.7 },
        { url: "tulip.png", title: "Tulip", description: "Colorful flower.", rating: 4.6 },
        { url: "jasmine.png", title: "Jasmine", description: "Sweet fragrance.", rating: 4.8 }
    ];

    let currentIndex = 0;

    function showImage() {
        const img = IMAGES[currentIndex];

        document.getElementById("mainImage").src = img.url;
        document.getElementById("title").innerText = img.title;
        document.getElementById("description").innerText = img.description;
        document.getElementById("extra").innerText = "⭐ Rating: " + img.rating;
    }

    function slideLeft() {
        currentIndex = (currentIndex - 1 + IMAGES.length) % IMAGES.length;
        showImage();
    }

    function slideRight() {
        currentIndex = (currentIndex + 1) % IMAGES.length;
        showImage();
    }

    function createPreview() {
        const container = document.getElementById("gallery-preview");

        IMAGES.forEach((img, i) => {
            container.innerHTML += `<img src="${img.url}" class="preview-img" onclick="currentIndex=${i}; showImage()">`;
        });
    }

    createPreview();
    showImage();
</script>

</body>

</html>
