<!DOCTYPE html>
<html>

<head>
    <title>Flower Gallery</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            margin: 0;
        }

        h1 {
            text-align: center;
            color: #444;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .gallery-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
        }

        .main-img {
            width: 400px;
            height: 400px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .main-img:hover {
            transform: scale(1.03);
        }

        .btn {
            font-size: 22px;
            margin: 10px;
            padding: 12px;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .info {
            text-align: center;
            margin-top: 15px;
        }

        #title {
            color: #333;
        }

        #description {
            color: #666;
        }

        #extra {
            color: #888;
            font-size: 14px;
        }

        .gallery-preview {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 85px;
            height: 85px;
            margin: 6px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .preview-img:hover {
            transform: scale(1.1);
            border: 2px solid #667eea;
        }
    </style>
</head>

<body>

    <h1>🌸 Flower Gallery</h1>

    <div class="gallery-container">
        <button class="btn" onclick="slideLeft()">❮</button>

        <img id="mainImage" class="main-img">

        <button class="btn" onclick="slideRight()">❯</button>
    </div>

    <div class="info">
        <h2 id="title"></h2>
        <p id="description"></p>
        <p id="extra"></p>
    </div>

    <div class="gallery-preview" id="gallery-preview"></div>

    <script>
        const IMAGES = [
            { url: "rose.png", title: "Rose", description: "Symbol of love.", rating: 4.9 },
            { url: "lotus.png", title: "Lotus", description: "National flower.", rating: 4.8 },
            { url: "sunflower.png", title: "Sunflower", description: "Follows sun.", rating: 4.7 },
            { url: "", title: "Tulip", description: "Colorful flower.", rating: 4.6 },
            { url: "", title: "Jasmine", description: "Sweet fragrance.", rating: 4.8 }
        ];

        let currentIndex = 0;

        function showImage() {
            const img = IMAGES[currentIndex];

            document.getElementById("mainImage").src = img.url;
            document.getElementById("title").innerText = img.title;
            document.getElementById("description").innerText = img.description;
            document.getElementById("extra").innerText = "⭐ Rating: " + img.rating;
        }

        function slideLeft() {
            currentIndex = (currentIndex - 1 + IMAGES.length) % IMAGES.length;
            showImage();
        }

        function slideRight() {
            currentIndex = (currentIndex + 1) % IMAGES.length;
            showImage();
        }

        function createPreview() {
            const container = document.getElementById("gallery-preview");

            IMAGES.forEach((img, i) => {
                container.innerHTML += `<img src="${img.url}" class="preview-img" onclick="currentIndex=${i}; showImage()">`;
            });
        }

        createPreview();
        showImage();
    </script>

</body>

</html>
